<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aide Animale | Bracelet Souvenir</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7E67; --secondary: #2F5D62; --accent: #FFD5CD; --bg: #FFF9F8; --text: #2D2D2D; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-weight: 800; font-size: 1.8rem; color: var(--secondary); margin-bottom: 10px; }
        
        .impact-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; text-align: center; }
        .impact-card { background: white; padding: 15px 5px; border-radius: 18px; border: 1px solid #f0f0f0; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .impact-card b { display: block; color: var(--primary); font-size: 1.1rem; }
        .impact-card span { font-size: 0.75rem; font-weight: 600; color: var(--secondary); display: block; margin-top: 5px; }

        .card { background: var(--white); border-radius: 30px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(255, 126, 103, 0.1); text-align: center; }
        
        /* IMAGE TEST */
        .main-img { width: 100%; border-radius: 20px; margin-bottom: 15px; }

        /* BOUTONS */
        .btn { display: block; width: 100%; padding: 18px; text-align: center; border-radius: 20px; font-weight: 700; font-size: 1.1rem; text-decoration: none; transition: 0.3s; border: none; cursor: pointer; margin-top: 10px; }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 8px 20px rgba(255, 126, 103, 0.3); }
        .btn-outline { background-color: var(--accent); color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🐾 Aide Animale</h1>
        <p>Un petit geste pour une grande cause.</p>
    </header>

    <div class="impact-box">
        <div class="impact-card"><b>5€</b><span>1 repas</span></div>
        <div class="impact-card"><b>15€</b><span>1 vaccin</span></div>
        <div class="impact-card"><b>50€</b><span>1 soin</span></div>
    </div>

    <div class="card">
        <h2 style="margin-bottom: 15px; color: var(--secondary);">Votre Bracelet Souvenir</h2>
        <img src="-1106250143-76688371.jpg" class="main-img" alt="Bracelet">
        
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Personnalisé avec la photo de votre compagnon.</p>
        
        <a href="https://buy.stripe.com/6oU6oJaZigp9fsJfRX67S00" class="btn btn-primary">Faire un don de 15€</a>
    </div>

    <div class="card">
        <h2 style="font-size: 1.1rem; color: var(--secondary);">❤️ Don Libre</h2>
        <a href="https://buy.stripe.com/6oU6oJaZigp9fsJfRX67S00" class="btn btn-outline">Donner le montant de mon choix</a>
    </div>

    <footer style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 20px;">
        © 2024 Aide Animale • Paiement sécurisé via Stripe
    </footer>
</div>

</body>
</html>
