<style>

body{
font-family:'Nunito',sans-serif;
margin:0;
background:#fafafa;
color:#333;
font-size:15px;
}

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

/* HERO */

.hero{
text-align:center;
background:white;
padding:25px 15px;
}

.logo{
width:85px;
margin-bottom:10px;
}

.hero h1{
font-size:26px;
margin-bottom:8px;
}

.hero p{
color:#666;
max-width:620px;
margin:auto;
line-height:1.5;
font-size:14px;
}

/* SOCIAL PROOF */

.trust{
display:flex;
justify-content:center;
gap:25px;
margin-top:15px;
font-size:13px;
}

/* PRODUCT */

.product{
display:flex;
flex-wrap:wrap;
gap:30px;
margin-top:25px;
align-items:center;
}

.gallery{
flex:1;
display:flex;
gap:10px;
overflow-x:auto;
}

.gallery img{
height:210px;
border-radius:10px;
}

.product-info{
flex:1;
}

.price{
font-size:22px;
font-weight:700;
margin:15px 0;
}

button{
border:none;
padding:12px 22px;
border-radius:8px;
font-weight:700;
font-size:14px;
cursor:pointer;
margin-top:8px;
}

.buy{
background:#2d6cdf;
color:white;
}

.pack{
background:#111;
color:white;
}

/* COLOR SELECTOR */

.colors{
margin-top:15px;
}

.color{
width:26px;
height:26px;
border-radius:50%;
display:inline-block;
margin-right:8px;
border:2px solid #ddd;
cursor:pointer;
}

.color.selected{
border:3px solid black;
}

.white{background:white;}
.black{background:black;}
.blue{background:#2d6cdf;}
.green{background:#38b96b;}

/* IMPACT */

.impact{
background:white;
padding:40px 15px;
text-align:center;
margin-top:30px;
}

.impact h2{
font-size:22px;
}

.impact-box{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:20px;
}

.impact-item h3{
font-size:20px;
margin-bottom:5px;
}

/* REVIEWS */

.reviews{
margin-top:25px;
overflow:hidden;
}

.track{
display:flex;
gap:15px;
animation:scroll 35s linear infinite;
}

.review{
background:white;
padding:15px;
border-radius:8px;
min-width:210px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:13px;
}

.stars{
color:#f5a623;
margin-bottom:4px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* URGENCY */

.urgency{
background:#fff5f5;
text-align:center;
padding:25px 15px;
margin-top:30px;
font-weight:700;
color:#c62828;
font-size:14px;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
color:#777;
font-size:12px;
}

</style>
