<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aide Animale | Sauvez une vie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7E67; /* Orange Corail */
            --secondary: #3A6D72; 
            --white: #ffffff;
            --text: #444444;
        }

        /* FORCE LE FOND BLANC ICI */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FFFFFF !important; 
            color: var(--text); 
            line-height: 1.6; 
            padding: 20px; 
        }
        
        .container { max-width: 450px; margin: 0 auto; background: white; }

        header { text-align: center; padding: 30px 0; }
        
        /* LOGO */
        .logo-img { width: 120px; height: auto; margin-bottom: 15px; }
        
        h1 { font-family: 'Playfair Display', serif; font-weight: 700; font-style: italic; font-size: 2rem; color: var(--secondary); margin-bottom: 10px; }
        
        .impact-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .impact-card { background: #fff; padding: 15px 5px; border-radius: 20px; border: 1px solid #eee; text-align: center; }
        .impact-card b { display: block; color: var(--primary); font-size: 1.2rem; }
        .impact-card span { font-size: 0.75rem; color: var(--secondary); display: block; }

        .card { background: #FFF9F8; border-radius: 30px; padding: 25px; margin-bottom: 25px; text-align: center; border: 1px solid rgba(255,126,103,0.1); }
        
        .main-img-container { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .main-img-container img { width: 100%; display: block; }

        .btn { display: block; width: 100%; padding: 18px; text-align: center; border-radius: 20px; font-weight: 700; font-size: 1.1rem; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 8px 20px rgba(255, 126, 103, 0.2); }
        .btn-outline { background-color: white; color: var(--primary); border: 2px solid var(--primary); margin-top: 15px; }

        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="1000116644.png" alt="Logo Aide Animale" class="logo-img">
        <h1>Un scan. Une vie.</h1>
    </header>

    <div class="impact-box">
        <div class="impact-card"><b>5€</b><span>1 repas</span></div>
        <div class="impact-card"><b>15€</b><span>1 vaccin</span></div>
        <div class="impact-card"><b>50€</b><span>1 soin</span></div>
    </div>

    <div class="card">
        <div class="main-img-container">
            <img src="-1106250143-76688371.jpg" alt="Bracelet Souvenir">
        </div>
        <p style="text-align: left; font-size: 0.95rem; margin-bottom: 20px;">
            En offrant <b>dès 15€</b>, vous sauvez un animal et recevez ce bracelet souvenir unique.
        </p>
        <a href="https://buy.stripe.com/cNicN76J20qb6Wd0X367S02" class="btn btn-primary">Recevoir mon bracelet</a>
    </div>

    <div class="card" style="background: white; border: 2px dashed #eee;">
        <p style="font-size: 0.9rem; margin-bottom: 15px;">Faire un don libre sans bracelet</p>
        <a href="https://buy.stripe.com/00wbJ36J28WH4O549f67S01" class="btn btn-outline">Don libre</a>
    </div>

    <footer>© 2024 Aide Animale • Paiement Sécurisé</footer>
</div>

</body>
</html>
